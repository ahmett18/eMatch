
<!DOCTYPE html>
<html lang="so" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0d1117">
  <meta name="description" content="eMatch — Matches">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>eMatch — Matches</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
  <style>
    .search-bar {
      position: sticky; top: 56px; z-index: 90;
      background: rgba(13,17,23,.95);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      padding: var(--sp-sm) var(--sp-md);
      border-bottom: 1px solid var(--glass-border);
    }
    .search-input-wrap { position: relative; display: flex; align-items: center; }
    .search-input-wrap svg {
      position: absolute; left: 14px;
      color: var(--text-muted); width: 18px; height: 18px; pointer-events: none;
    }
    .search-input-wrap input {
      padding-left: 42px; min-height: 42px;
      font-size: 14px; border-radius: var(--r-full);
    }
    .platform-selector {
      display: flex; gap: var(--sp-sm); overflow-x: auto;
      scrollbar-width: none; padding: var(--sp-sm) var(--sp-md);
    }
    .platform-selector::-webkit-scrollbar { display: none; }
    .platform-btn {
      flex-shrink: 0; display: flex; flex-direction: column;
      align-items: center; gap: 4px; padding: 8px 14px;
      background: var(--bg-card); border: 1.5px solid var(--border);
      border-radius: var(--r-md); cursor: pointer;
      transition: all var(--dur-fast) var(--ease);
      min-width: 64px; font-family: inherit;
    }
    .platform-btn .icon  { font-size: 22px; }
    .platform-btn .label { font-size: 10px; font-weight: 600; color: var(--text-muted); white-space: nowrap; }
    .platform-btn.active { background: rgba(0,230,118,.1); border-color: var(--accent-green); }
    .platform-btn.active .label { color: var(--accent-green); }
    .platform-btn:active { transform: scale(.93); }
    .sort-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: var(--sp-sm) var(--sp-md);
      border-bottom: 1px solid var(--glass-border);
    }
    .sort-select {
      min-height: 34px; font-size: 12px;
      padding: 0 30px 0 10px; border-radius: var(--r-full); width: auto;
    }
    .match-list-item {
      display: flex; align-items: center; gap: var(--sp-md);
      padding: var(--sp-md); border-bottom: 1px solid var(--glass-border);
      cursor: pointer; transition: background var(--dur-fast) var(--ease);
    }
    .match-list-item:active { background: var(--glass-bg); }
    .match-list-icon {
      width: 52px; height: 52px; border-radius: var(--r-md);
      background: linear-gradient(135deg,#1a2744,#0f1b35);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; flex-shrink: 0; position: relative; overflow: hidden;
    }
    .match-list-info { flex: 1; min-width: 0; }
    .match-list-title {
      font-size: 15px; font-weight: 700;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px;
    }
    .match-list-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .match-list-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
    .match-stake-big { font-size: 16px; font-weight: 900; color: var(--accent-green); }
    .live-count-badge {
      display: inline-flex; align-items: center; gap: 4px;
      background: rgba(239,68,68,.15); color: var(--accent-red);
      font-size: 11px; font-weight: 700; padding: 2px 8px;
      border-radius: var(--r-full); border: 1px solid rgba(239,68,68,.3);
    }
    .live-count-badge::before {
      content: ''; width: 6px; height: 6px;
      background: var(--accent-red); border-radius: 50%;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .prize-pool-banner {
      background: linear-gradient(135deg,#1a0a2e,#0d2137);
      border: 1px solid var(--glass-border); border-radius: var(--r-md);
      padding: var(--sp-md); margin: var(--sp-sm) var(--sp-md);
      display: flex; align-items: center; gap: var(--sp-md);
      position: relative; overflow: hidden;
    }
    .prize-pool-banner::before {
      content: ''; position: absolute; top: -20px; right: -20px;
      width: 100px; height: 100px;
      background: radial-gradient(circle,rgba(255,215,0,.15),transparent 70%);
      border-radius: 50%;
    }
    .prize-pool-text { flex: 1; position: relative; z-index: 1; }
    .prize-pool-text h3 { font-size: 15px; margin-bottom: 2px; }
    .prize-pool-text p  { font-size: 12px; margin: 0; }
    .prize-pool-amount { font-size: 22px; font-weight: 900; color: var(--accent-gold); position: relative; z-index: 1; }
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: var(--sp-xl) var(--sp-md);
      text-align: center; min-height: 300px;
    }
    .empty-state .icon { font-size: 56px; margin-bottom: var(--sp-md); }
  </style>
</head>
<body>
<div id="app">

  <div id="offline-banner" class="offline-banner hidden" role="alert" aria-live="assertive">
    📵 Internetka kuma xidna
  </div>

  <!-- Header -->
  <header class="top-header">
    <div class="logo">Matches</div>
    <div class="header-actions">
      <div class="coin-chip" onclick="window.location.href='wallet.html'"
        role="button" tabindex="0" aria-label="Wallet">
        🪙 <span class="coin-balance-display">—</span>
      </div>
      <div class="avatar" onclick="window.location.href='profile.html'"
        role="button" tabindex="0" aria-label="Profile">?</div>
    </div>
  </header>

  <!-- Search -->
  <div class="search-bar">
    <div class="search-input-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="search" id="matches-search"
        placeholder="Platform, cinwaan ku raadi..."
        inputmode="search" autocomplete="off" aria-label="Matches ku raadi">
    </div>
  </div>

  <main class="page-content" role="main">

    <!-- Prize Pool -->
    <div class="prize-pool-banner">
      <div class="prize-pool-text">
        <h3>🏆 Active Prize Pools</h3>
        <p>Hadda socda matches-ka ku biir</p>
      </div>
      <div class="prize-pool-amount">🪙 <span id="prize-pool-number">—</span></div>
    </div>

    <!-- Summary Cards -->
    <div style="display:flex;gap:var(--sp-sm);padding:0 var(--sp-md) var(--sp-sm)">
      <div class="card card-glass" style="flex:1;padding:10px;text-align:center;cursor:pointer"
        id="summary-open" onclick="matchesPageSetFilter('open')">
        <div style="font-size:18px;font-weight:900;color:var(--accent-green)" id="count-open">—</div>
        <div style="font-size:10px;color:var(--text-muted);font-weight:600">FURAN</div>
      </div>
      <div class="card card-glass" style="flex:1;padding:10px;text-align:center;cursor:pointer"
        id="summary-locked" onclick="matchesPageSetFilter('locked')">
        <div style="font-size:18px;font-weight:900;color:var(--accent-red)" id="count-locked">—</div>
        <div style="font-size:10px;color:var(--text-muted);font-weight:600">SOCDA</div>
      </div>
      <div class="card card-glass" style="flex:1;padding:10px;text-align:center;cursor:pointer"
        id="summary-done" onclick="matchesPageSetFilter('done')">
        <div style="font-size:18px;font-weight:900;color:var(--text-secondary)" id="count-done">—</div>
        <div style="font-size:10px;color:var(--text-muted);font-weight:600">DHAMAADAY</div>
      </div>
      <div class="card card-glass" style="flex:1;padding:10px;text-align:center;cursor:pointer"
        onclick="matchesPageSetFilter('all')">
        <div style="font-size:18px;font-weight:900;color:var(--accent-blue)" id="count-all">—</div>
        <div style="font-size:10px;color:var(--text-muted);font-weight:600">DHAMMAAN</div>
      </div>
    </div>

    <!-- Platform Filter -->
    <div class="platform-selector" role="group" aria-label="Platform filter">
      <button class="platform-btn active" data-platform="all">
        <span class="icon">🎮</span><span class="label">Dhammaan</span>
      </button>
      <button class="platform-btn" data-platform="FIFA">
        <span class="icon">⚽</span><span class="label">FIFA</span>
      </button>
      <button class="platform-btn" data-platform="FC Mobile">
        <span class="icon">⚽</span><span class="label">FC Mobile</span>
      </button>
      <button class="platform-btn" data-platform="eFootball">
        <span class="icon">⚽</span><span class="label">eFootball</span>
      </button>
      <button class="platform-btn" data-platform="NBA 2K">
        <span class="icon">🏀</span><span class="label">NBA 2K</span>
      </button>
      <button class="platform-btn" data-platform="PUBG">
        <span class="icon">🔫</span><span class="label">PUBG</span>
      </button>
      <button class="platform-btn" data-platform="Free Fire">
        <span class="icon">🔫</span><span class="label">Free Fire</span>
      </button>
      <button class="platform-btn" data-platform="COD">
        <span class="icon">🔫</span><span class="label">COD</span>
      </button>
    </div>

    <!-- Sort + Count -->
    <div class="sort-bar">
      <div style="display:flex;align-items:center;gap:var(--sp-sm)">
        <span style="font-size:12px;color:var(--text-muted)">
          <span id="visible-count">—</span> match
        </span>
        <span class="live-count-badge">
          <span id="live-count">0</span> LIVE
        </span>
      </div>
      <select class="sort-select" id="sort-select" aria-label="Sort">
        <option value="newest">Cusub Hore</option>
        <option value="oldest">Duq Hore</option>
        <option value="stake-high">Stake ↑</option>
        <option value="stake-low">Stake ↓</option>
      </select>
    </div>

    <!-- Status Chips -->
    <div class="filter-bar" role="tablist" aria-label="Status filter">
      <button class="filter-chip active" data-filter="all"    role="tab" aria-selected="true">🎮 Dhammaan</button>
      <button class="filter-chip"        data-filter="open"   role="tab" aria-selected="false">🟢 Furan</button>
      <button class="filter-chip"        data-filter="locked" role="tab" aria-selected="false">🔴 Socda</button>
      <button class="filter-chip"        data-filter="done"   role="tab" aria-selected="false">✅ Dhammaaday</button>
    </div>

    <!-- Matches List -->
    <div id="matches-full-list" role="list" aria-live="polite">
      <!-- Skeleton -->
      <div class="match-list-item" style="pointer-events:none">
        <div class="skeleton" style="width:52px;height:52px;border-radius:12px;flex-shrink:0"></div>
        <div style="flex:1">
          <div class="skeleton sk-line" style="width:70%;margin-bottom:8px"></div>
          <div class="skeleton sk-line" style="width:45%"></div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
          <div class="skeleton" style="width:60px;height:18px;border-radius:4px"></div>
          <div class="skeleton" style="width:40px;height:14px;border-radius:4px"></div>
        </div>
      </div>
      <div class="match-list-item" style="pointer-events:none">
        <div class="skeleton" style="width:52px;height:52px;border-radius:12px;flex-shrink:0"></div>
        <div style="flex:1">
          <div class="skeleton sk-line" style="width:60%;margin-bottom:8px"></div>
          <div class="skeleton sk-line" style="width:50%"></div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
          <div class="skeleton" style="width:55px;height:18px;border-radius:4px"></div>
          <div class="skeleton" style="width:45px;height:14px;border-radius:4px"></div>
        </div>
      </div>
      <div class="match-list-item" style="pointer-events:none">
        <div class="skeleton" style="width:52px;height:52px;border-radius:12px;flex-shrink:0"></div>
        <div style="flex:1">
          <div class="skeleton sk-line" style="width:80%;margin-bottom:8px"></div>
          <div class="skeleton sk-line" style="width:40%"></div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
          <div class="skeleton" style="width:65px;height:18px;border-radius:4px"></div>
          <div class="skeleton" style="width:35px;height:14px;border-radius:4px"></div>
        </div>
      </div>
    </div>

  </main>

  <!-- Bottom Nav -->
  <nav class="bottom-nav" role="navigation" aria-label="Main navigation">
  <a class="nav-item" data-page="dashboard.html" href="dashboard.html">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
    <span>Home</span>
  </a>
  <a class="nav-item active" data-page="matches.html" href="matches.html" aria-current="page">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
      <line x1="8" y1="21" x2="16" y2="21"/>
      <line x1="12" y1="17" x2="12" y2="21"/>
    </svg>
    <span>Matches</span>
  </a>
  <a class="nav-item create-btn" href="dashboard.html" onclick="localStorage.setItem('open_create','1')">
    <div class="nav-icon-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </div>
    <span>Abuur</span>
  </a>
  <a class="nav-item" data-page="wallet.html" href="wallet.html">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M20 12V22H4V12"/><path d="M22 7H2v5h20V7z"/>
      <path d="M12 22V7"/>
      <path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/>
      <path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/>
    </svg>
    <span>Wallet</span>
  </a>
  <a class="nav-item" data-page="profile.html" href="profile.html">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
      <circle cx="12" cy="7" r="4"/>
    </svg>
    <span>Profile</span>
  </a>
</nav>

<!-- app.js OOKELIYA — inline script la'aan -->
<script type="module" src="js/app.js"></script>

</body>
</html>
