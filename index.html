<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eMatch - Login</title>
    <!-- CSS Styles same as before -->
    <style>
        :root { --bg-primary: #0a0a0f; --bg-card: rgba(18, 18, 26, 0.85); --fg: #e6edf3; --fg-muted: #7d8590; --accent-gold: #ffd700; --border: rgba(255, 215, 0, 0.15); --danger: #ff4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Rajdhani', sans-serif; background: var(--bg-primary); color: var(--fg); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        #particles-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        .auth-container { position: relative; z-index: 10; width: 100%; max-width: 420px; padding: 20px; }
        .glass-card { background: var(--bg-card); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 24px; padding: 32px 24px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5); }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo-text { font-family: 'Orbitron', monospace; font-size: 1.75rem; font-weight: 800; letter-spacing: 2px; }
        .logo-text span { color: var(--accent-gold); }
        .tabs { display: flex; background: rgba(0,0,0,0.3); border-radius: 16px; padding: 4px; margin-bottom: 24px; }
        .tab { flex: 1; text-align: center; padding: 12px; font-family: 'Orbitron', monospace; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; color: var(--fg-muted); cursor: pointer; border-radius: 12px; transition: all 0.3s ease; }
        .tab.active { background: linear-gradient(135deg, var(--accent-gold), #b8860b); color: var(--bg-primary); }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--fg-muted); margin-bottom: 8px; text-transform: uppercase; }
        .form-input { width: 100%; padding: 14px 18px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 12px; color: var(--fg); font-size: 1rem; font-family: 'Rajdhani', sans-serif; }
        .form-input:focus { outline: none; border-color: var(--accent-gold); }
        .btn-primary { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--accent-gold), #b8860b); color: var(--bg-primary); font-family: 'Orbitron', monospace; font-weight: 700; font-size: 0.875rem; text-transform: uppercase; border: none; border-radius: 12px; cursor: pointer; }
        .message-box { padding: 12px; border-radius: 10px; font-size: 0.85rem; text-align: center; margin-top: 16px; display: none; }
        .error { background: rgba(255,68,68,0.1); border: 1px solid var(--danger); color: #ff6b6b; display: block; }
        .success { background: rgba(0,255,136,0.1); border: 1px solid #00ff88; color: #00ff88; display: block; }
        .hidden { display: none !important; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="particles-canvas"></canvas>
    <div class="auth-container">
        <div class="glass-card">
            <div class="logo">
                <div class="logo-text">e<span>Match</span></div>
                <div style="font-size:0.85rem;color:var(--fg-muted);letter-spacing:1px;">Competitive Gaming Arena</div>
            </div>

            <div class="tabs">
                <div class="tab active" data-tab="login">Login</div>
                <div class="tab" data-tab="signup">Sign Up</div>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-input" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-input" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary">Login to Arena</button>
                <div id="loginMsg" class="message-box error"></div>
            </form>

            <form id="signupForm" class="hidden">
                <div class="form-group">
                    <label class="form-label">Gamer Tag</label>
                    <input type="text" name="displayName" class="form-input" placeholder="ProGamer_X">
                </div>
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-input" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-input" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary">Create Account</button>
                <div id="signupMsg" class="message-box"></div>
            </form>
        </div>
    </div>

    <script>
        const c = document.getElementById('particles-canvas'), ctx = c.getContext('2d'); let p = [];
        function init() { c.width = innerWidth; c.height = innerHeight; p = []; for (let i = 0; i < 60; i++) p.push({ x: Math.random() * c.width, y: Math.random() * c.height, r: Math.random() * 1.5, vx: (Math.random() - 0.5) * 0.4, vy: (Math.random() - 0.5) * 0.4, a: Math.random() * 0.5 + 0.2 }); }
        function draw() { ctx.clearRect(0, 0, c.width, c.height); p.forEach(e => { e.x += e.vx; e.y += e.vy; if (e.x < 0) e.x = c.width; if (e.x > c.width) e.x = 0; if (e.y < 0) e.y = c.height; if (e.y > c.height) e.y = 0; ctx.beginPath(); ctx.arc(e.x, e.y, Math.max(1, e.r * 2), 0, Math.PI * 2); ctx.fillStyle = `rgba(255,215,0,${e.a})`; ctx.fill(); }); requestAnimationFrame(draw); }
        window.addEventListener('resize', init); init(); draw();
    </script>

    <script type="module">
        import { signUpWithEmail, signInWithEmail, onAuthChange } from "./js/auth.js";

        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');
        const tabs = document.querySelectorAll('.tab');
        
        tabs.forEach(t => t.addEventListener('click', () => {
            tabs.forEach(x => x.classList.remove('active')); t.classList.add('active');
            const isLogin = t.dataset.tab === 'login';
            loginForm.classList.toggle('hidden', !isLogin);
            signupForm.classList.toggle('hidden', isLogin);
            clearMsgs();
        }));

        function showMsg(el, msg, isErr) { el.textContent = msg; el.className = `message-box ${isErr ? 'error' : 'success'}`; }
        function clearMsgs() { document.querySelectorAll('.message-box').forEach(m => m.className = 'message-box'); }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault(); clearMsgs();
            const fd = new FormData(loginForm);
            const res = await signInWithEmail(fd.get('email'), fd.get('password'));
            if (res.success) window.location.href = 'user/index.html'; // REDIRECT TO USER FOLDER
            else showMsg(document.getElementById('loginMsg'), res.error, true);
        });

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault(); clearMsgs();
            const fd = new FormData(signupForm);
            const res = await signUpWithEmail(fd.get('email'), fd.get('password'), fd.get('displayName'));
            const msgEl = document.getElementById('signupMsg');
            if (res.success) {
                showMsg(msgEl, "Account created! Redirecting...", false);
                setTimeout(() => window.location.href = 'user/index.html', 1000); // REDIRECT TO USER FOLDER
            } else showMsg(msgEl, res.error, true);
        });

        // Auto redirect if already logged in
        onAuthChange(user => {
            if(user) window.location.href = 'user/index.html'; 
        });
    </script>
</body>
</html>
